<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Currency">
    <meta name="theme-color" content="#050505">
    
    <title>Currency</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='4' fill='%23050505'/%3E%3Cpath d='M12 21C16.9 21 21 16.9 21 12C21 7.1 16.9 3 12 3C7.1 3 3 7.1 3 12C3 16.9 7.1 21 12 21Z' stroke='%23ffffff' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M12 6V18' stroke='%23ffffff' stroke-width='1.5' stroke-linecap='round'/%3E%3Cpath d='M9.5 9.5H13.5C14.3 9.5 15 10.2 15 11C15 11.8 14.3 12.5 13.5 12.5H10.5C9.7 12.5 9 13.2 9 14C9 14.8 9.7 15.5 10.5 15.5H14.5' stroke='%23ffffff' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M5.6 5.6L8.4 8.4' stroke='%23ffffff' stroke-width='1.5' stroke-linecap='round'/%3E%3Cpath d='M18.4 18.4L15.6 15.6' stroke='%23ffffff' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=%E2%82%AC&background=050505&color=fff&size=512&font-size=0.7&bold=true">

    <style>
        /* 1. 核心布局：鎖定高度與消除間隙 */
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            position: fixed; 
            background-color: #050505; /* 確保底層背景色一致 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            user-select: none; 
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100dvh; 
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }

        /* 背景光暈 */
        .blob {
            position: absolute;
            filter: blur(90px);
            z-index: 0;
            opacity: 0.65;
            animation: moveBlob 18s infinite alternate ease-in-out;
        }
        .blob-1 {
            width: 350px; height: 350px;
            background: linear-gradient(135deg, #5e2b97, #1a1025);
            top: -5%; left: -10%;
        }
        .blob-2 {
            width: 300px; height: 300px;
            background: linear-gradient(135deg, #154e7a, #0a192f);
            bottom: -5%; right: -10%;
            animation-delay: -7s;
        }

        @keyframes moveBlob {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(60px, 40px) scale(1.15); }
            100% { transform: translate(-40px, -60px) scale(0.85); }
        }

        /* 主畫面玻璃面板 */
        .glass-panel {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            height: 100%; 
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top) 20px calc(env(safe-area-inset-bottom) + 15px) 20px;
            background: rgba(10, 10, 10, 0.45);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        @media (min-width: 480px) {
            .glass-panel {
                height: 90vh;
                border-radius: 40px;
                box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.1);
                margin: 20px 0;
            }
        }

        .header-container {
            display: flex; align-items: center; justify-content: center;
            margin-top: 5px; margin-bottom: 15px; gap: 10px;
        }

        h2 {
            font-size: 24px; font-weight: 700; letter-spacing: 1px;
            background: linear-gradient(135deg, #ffffff, #888888);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .input-group { margin-bottom: 12px; }

        select, input {
            width: 100%; padding: 12px 6px; font-size: 14px; color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; outline: none; appearance: none;
            text-align: center; text-align-last: center;
        }

        input {
            text-align: right; font-size: 28px; font-weight: 600; color: #0a84ff;
            background: rgba(0, 0, 0, 0.3); pointer-events: none;
            padding: 14px 18px;
        }

        .swap-btn {
            display: flex; justify-content: center; align-items: center;
            width: 42px; height: 42px; border-radius: 14px;
            background: rgba(255, 255, 255, 0.12); border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff; font-size: 22px; cursor: pointer; flex-shrink: 0;
        }

        .swap-btn:active { transform: scale(0.8); }

        .result-container {
            flex-grow: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; margin-bottom: 10px;
        }

        .result-amount {
            font-size: 46px; font-weight: 800; text-align: center;
            background: linear-gradient(135deg, #ffffff 0%, #a0a0a0 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .status-text { text-align: center; font-size: 11px; color: #ffcc00; margin-bottom: 10px; }

        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding-bottom: 10px; }

        .key-btn {
            background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 22px; padding: 16px 0; font-size: 26px; font-weight: 500; color: #ffffff;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
        }

        .key-btn:active { background: rgba(255, 255, 255, 0.25); transform: scale(0.92); }
        .operator { background: rgba(10, 132, 255, 0.15); color: #5e5ce6; }
        .key-delete { color: #ff453a; }
        .key-equals {
            background: linear-gradient(135deg, #0a84ff, #5e5ce6); grid-column: span 2;
        }
        .key-zero { grid-column: span 2; }

        /* --- 橫向螢幕鎖定提示優化 --- */
        .portrait-lock-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100dvh;
            background: #050505;
            z-index: 9999; color: #ffffff;
            text-align: center; flex-direction: column;
            justify-content: center; align-items: center;
            backface-visibility: hidden;
        }

        .portrait-lock-icon {
            font-size: 60px; margin-bottom: 24px;
            display: inline-block;
            transform-origin: center center;
            animation: tiltPhone 2.5s infinite cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
        }

        .portrait-lock-text {
            font-size: 20px; font-weight: 600; letter-spacing: 2px; line-height: 1.6;
            background: linear-gradient(135deg, #ffffff 0%, #a0a0a0 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            padding: 0 20px;
        }

        @keyframes tiltPhone {
            0%, 100% { transform: rotate(-90deg) translateZ(0); }
            40%, 60% { transform: rotate(0deg) translateZ(0); }
        }

        @media (hover: none) and (pointer: coarse) and (orientation: landscape) {
            .portrait-lock-overlay {
                display: flex;
                backdrop-filter: blur(25px);
                -webkit-backdrop-filter: blur(25px);
            }
            .glass-panel { display: none; }
        }
    </style>
</head>
<body>

<div class="portrait-lock-overlay">
    <div class="portrait-lock-icon">📱</div>
    <div class="portrait-lock-text">請將手機轉回直向<br>以獲得最佳體驗</div>
</div>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="glass-panel">
    <div class="header-container">
        <h2>Currency</h2>
    </div>

    <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 12px;">
        <div class="input-group" style="flex: 1; margin-bottom: 0;">
            <select id="fromCurrency">
                <option value="USD">🇺🇸 美金 (USD)</option>
                <option value="TWD" selected>🇹🇼 新台幣 (TWD)</option>
                <option value="BTC">₿ 比特幣 (BTC)</option>
                <option value="XAU">🪙 黃金 (XAU)</option>
                <option value="JPY">🇯🇵 日幣 (JPY)</option>
                <option value="EUR">🇪🇺 歐元 (EUR)</option>
            </select>
        </div>
        <div id="swapBtn" class="swap-btn">⇄</div>
        <div class="input-group" style="flex: 1; margin-bottom: 0;">
            <select id="toCurrency">
                <option value="USD" selected>🇺🇸 美金 (USD)</option>
                <option value="TWD">🇹🇼 新台幣 (TWD)</option>
                <option value="BTC">₿ 比特幣 (BTC)</option>
                <option value="XAU">🪙 黃金 (XAU)</option>
            </select>
        </div>
    </div>

    <div class="input-group"><input type="text" id="amount" value="0" readonly></div>
    <div class="result-container"><div class="result-amount" id="result">0.00</div></div>
    <div class="status-text" id="status">正在獲取最新匯率...</div>

    <div class="keypad">
        <div class="key-btn" onclick="pressKey('7')">7</div>
        <div class="key-btn" onclick="pressKey('8')">8</div>
        <div class="key-btn" onclick="pressKey('9')">9</div>
        <div class="key-btn operator" onclick="pressKey('÷')">÷</div>
        <div class="key-btn" onclick="pressKey('4')">4</div>
        <div class="key-btn" onclick="pressKey('5')">5</div>
        <div class="key-btn" onclick="pressKey('6')">6</div>
        <div class="key-btn operator" onclick="pressKey('×')">×</div>
        <div class="key-btn" onclick="pressKey('1')">1</div>
        <div class="key-btn" onclick="pressKey('2')">2</div>
        <div class="key-btn" onclick="pressKey('3')">3</div>
        <div class="key-btn operator" onclick="pressKey('-')">-</div>
        <div class="key-btn key-zero" onclick="pressKey('0')">0</div>
        <div class="key-btn" onclick="pressKey('.')">.</div>
        <div class="key-btn operator" onclick="pressKey('+')">+</div>
        <div class="key-btn key-delete key-zero" id="deleteBtn">⌫</div>
        <div class="key-btn key-equals" onclick="calculateMathResult()">=</div>
    </div>
</div>

<script>
    // 匯率與邏輯
    let exchangeRates = { USD: 1.0, TWD: 32.2, BTC: 0.000015, XAU: 0.00042, JPY: 155.0, EUR: 0.93 };
    const amountInput = document.getElementById('amount');
    const resultDisplay = document.getElementById('result');
    const statusText = document.getElementById('status');
    const fromSelect = document.getElementById('fromCurrency');
    const toSelect = document.getElementById('toCurrency');
    const deleteBtn = document.getElementById('deleteBtn');
    const swapBtn = document.getElementById('swapBtn');
    let currentInputValue = "0";

    // 1. 旋轉與黑邊修復邏輯
    function fixRotationLayout() {
        window.scrollTo(0, 0);
        document.body.style.height = '99.9%';
        setTimeout(() => { document.body.style.height = '100%'; }, 50);
    }
    window.addEventListener('orientationchange', () => setTimeout(fixRotationLayout, 300));
    window.addEventListener('resize', fixRotationLayout);

    // 2. 觸覺反饋
    function hapticFeedback(type = 'light') {
        if (navigator.vibrate) {
            if (type === 'light') navigator.vibrate(15);
            if (type === 'heavy') navigator.vibrate([40, 20, 40]);
        }
    }

    // 3. 獲取即時匯率
    async function fetchLiveRates() {
        try {
            const res = await fetch('https://open.er-api.com/v6/latest/USD');
            const data = await res.json();
            if (data.result === "success") {
                exchangeRates = {...exchangeRates, ...data.rates};
                statusText.textContent = "🟢 即時匯率已同步";
            }
            processConversion();
        } catch (e) {
            statusText.textContent = "🔴 無法連線，使用預設匯率";
        }
    }

    // 4. 計算與轉換邏輯
    function pressKey(key) {
        hapticFeedback('light');
        if (currentInputValue === "0" && key !== ".") currentInputValue = key;
        else if (currentInputValue.length < 18) currentInputValue += key;
        updateDisplayAndConvert();
    }

    function calculateMathResult() {
        hapticFeedback('heavy');
        try {
            let res = eval(currentInputValue.replace(/×/g, '*').replace(/÷/g, '/'));
            currentInputValue = String(Math.round(res * 10000) / 10000);
            updateDisplayAndConvert();
        } catch (e) {}
    }

    function updateDisplayAndConvert() {
        amountInput.value = currentInputValue;
        processConversion();
    }

    function processConversion() {
        try {
            let amount = eval(currentInputValue.replace(/×/g, '*').replace(/÷/g, '/'));
            const final = (amount / exchangeRates[fromSelect.value]) * exchangeRates[toSelect.value];
            resultDisplay.textContent = final.toLocaleString(undefined, { maximumFractionDigits: 4 });
        } catch (e) {}
    }

    swapBtn.addEventListener('click', () => {
        hapticFeedback('light');
        [fromSelect.value, toSelect.value] = [toSelect.value, fromSelect.value];
        processConversion();
    });

    // 5. 刪除鍵長按邏輯
    let deleteTimer;
    deleteBtn.addEventListener('touchstart', (e) => {
        e.preventDefault(); hapticFeedback('light');
        deleteTimer = setTimeout(() => {
            currentInputValue = "0"; updateDisplayAndConvert(); hapticFeedback('heavy'); deleteTimer = null;
        }, 600);
    });
    deleteBtn.addEventListener('touchend', (e) => {
        if (deleteTimer) {
            clearTimeout(deleteTimer);
            currentInputValue = currentInputValue.length > 1 ? currentInputValue.slice(0, -1) : "0";
            updateDisplayAndConvert();
        }
    });

    fetchLiveRates();
</script>
</body>
</html>
